<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="1200" height="440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b4a"/>
      <stop offset="40%" style="stop-color:#1a2d6d"/>
      <stop offset="100%" style="stop-color:#1558b0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4285F4"/>
      <stop offset="25%" style="stop-color:#34A853"/>
      <stop offset="50%" style="stop-color:#FBBC05"/>
      <stop offset="75%" style="stop-color:#EA4335"/>
      <stop offset="100%" style="stop-color:#4285F4"/>
    </linearGradient>
    <linearGradient id="pipelineBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.03)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.07)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.03)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="iconGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-opacity="0.4"/>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="rgba(255,255,255,0.5)"/>
    </marker>
  </defs>

  <!-- Background -->
