    <circle cx="20" cy="30" r="6" fill="#4285F4"/>
    <circle cx="60" cy="10" r="5" fill="#34A853"/>
    <circle cx="80" cy="50" r="8" fill="#FBBC05"/>
    <circle cx="40" cy="70" r="5" fill="#EA4335"/>
    <circle cx="100" cy="30" r="6" fill="#4285F4"/>
    <line x1="20" y1="30" x2="60" y2="10" stroke="white" stroke-width="1"/>
    <line x1="60" y1="10" x2="80" y2="50" stroke="white" stroke-width="1"/>
    <line x1="80" y1="50" x2="40" y2="70" stroke="white" stroke-width="1"/>
    <line x1="20" y1="30" x2="40" y2="70" stroke="white" stroke-width="1"/>
