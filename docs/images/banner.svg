<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#283593;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4285F4" />
      <stop offset="25%" style="stop-color:#34A853" />
      <stop offset="50%" style="stop-color:#FBBC05" />
      <stop offset="75%" style="stop-color:#EA4335" />
      <stop offset="100%" style="stop-color:#4285F4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="1200" y2="50" stroke="white" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="250" x2="1200" y2="250" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="350" x2="1200" y2="350" stroke="white" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="white" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="white" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="400" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="white" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="400" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke="white" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="400" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative data flow lines (left side) -->
  <g opacity="0.15" stroke="#4285F4" stroke-width="2" fill="none">
    <path d="M 30 80 Q 80 120 60 180 Q 40 240 90 280"/>
    <path d="M 70 60 Q 120 100 100 160 Q 80 220 130 260"/>
    <path d="M 110 90 Q 160 130 140 190 Q 120 250 170 290"/>
  </g>

  <!-- Decorative nodes (right side) -->
  <g opacity="0.12">
    <!-- Node cluster -->
    <circle cx="1050" cy="100" r="8" fill="#34A853"/>
    <circle cx="1090" cy="80" r="6" fill="#4285F4"/>
    <circle cx="1120" cy="120" r="10" fill="#FBBC05"/>
    <circle cx="1070" cy="150" r="7" fill="#EA4335"/>
    <circle cx="1110" cy="160" r="5" fill="#34A853"/>
    <circle cx="1140" cy="90" r="8" fill="#4285F4"/>
    <line x1="1050" y1="100" x2="1090" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="1090" y1="80" x2="1120" y2="120" stroke="#fff" stroke-width="1"/>
    <line x1="1120" y1="120" x2="1070" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="1050" y1="100" x2="1070" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="1070" y1="150" x2="1110" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="1140" y1="90" x2="1090" y2="80" stroke="#fff" stroke-width="1"/>

    <!-- Chart bars -->
    <rect x="1020" y="240" width="20" height="80" rx="3" fill="#4285F4"/>
    <rect x="1050" y="220" width="20" height="100" rx="3" fill="#34A853"/>
    <rect x="1080" y="260" width="20" height="60" rx="3" fill="#FBBC05"/>
    <rect x="1110" y="200" width="20" height="120" rx="3" fill="#EA4335"/>
    <rect x="1140" y="230" width="20" height="90" rx="3" fill="#4285F4"/>
  </g>

  <!-- Pipeline flow icons (center-left area) -->
  <g transform="translate(80, 180)" opacity="0.2">
    <!-- Google Ads icon (simplified) -->
    <rect x="0" y="0" width="36" height="36" rx="8" fill="#4285F4"/>
    <text x="18" y="24" text-anchor="middle" fill="white" font-size="18" font-family="Arial, sans-serif" font-weight="bold">G</text>

    <!-- Arrow -->
    <line x1="46" y1="18" x2="70" y2="18" stroke="#fff" stroke-width="2"/>
    <polygon points="70,12 82,18 70,24" fill="#fff"/>

    <!-- Cloud Function icon -->
    <rect x="90" y="0" width="36" height="36" rx="8" fill="#34A853"/>
    <text x="108" y="24" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="bold">f</text>

    <!-- Arrow -->
    <line x1="136" y1="18" x2="160" y2="18" stroke="#fff" stroke-width="2"/>
    <polygon points="160,12 172,18 160,24" fill="#fff"/>

    <!-- BigQuery icon -->
    <rect x="180" y="0" width="36" height="36" rx="8" fill="#FBBC05"/>
    <text x="198" y="24" text-anchor="middle" fill="white" font-size="14" font-family="Arial, sans-serif" font-weight="bold">BQ</text>

    <!-- Arrow -->
    <line x1="226" y1="18" x2="250" y2="18" stroke="#fff" stroke-width="2"/>
    <polygon points="250,12 262,18 250,24" fill="#fff"/>

    <!-- Dashboard icon -->
    <rect x="270" y="0" width="36" height="36" rx="8" fill="#EA4335"/>
    <text x="288" y="24" text-anchor="middle" fill="white" font-size="14" font-family="Arial, sans-serif" font-weight="bold">LS</text>
  </g>

  <!-- Google-colored accent bar -->
  <rect x="0" y="388" width="1200" height="12" fill="url(#accent)" rx="0"/>

  <!-- Main Title -->
  <text x="600" y="140" text-anchor="middle" fill="white" font-size="56" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="700" filter="url(#shadow)">
    pMax Performance Pack
  </text>

  <!-- Subtitle -->
  <text x="600" y="190" text-anchor="middle" fill="#B3C6E7" font-size="22" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="400">
    Google Performance Max Best Practices Dashboard
  </text>

  <!-- Feature pills -->
  <!-- Per-Asset Metrics pill -->
  <rect x="230" y="230" width="210" height="38" rx="19" fill="rgba(66, 133, 244, 0.25)" stroke="#4285F4" stroke-width="1.5"/>
  <circle cx="252" cy="249" r="6" fill="#4285F4"/>
  <text x="268" y="254" fill="#93C5FD" font-size="15" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="500">Per-Asset Metrics</text>

  <!-- API v23+ pill -->
  <rect x="465" y="230" width="165" height="38" rx="19" fill="rgba(52, 168, 83, 0.25)" stroke="#34A853" stroke-width="1.5"/>
  <circle cx="487" cy="249" r="6" fill="#34A853"/>
  <text x="503" y="254" fill="#86EFAC" font-size="15" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="500">API v23+ Ready</text>

  <!-- Automated Pipeline pill -->
  <rect x="655" y="230" width="210" height="38" rx="19" fill="rgba(251, 188, 5, 0.25)" stroke="#FBBC05" stroke-width="1.5"/>
  <circle cx="677" cy="249" r="6" fill="#FBBC05"/>
  <text x="693" y="254" fill="#FDE68A" font-size="15" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="500">Automated Pipeline</text>

  <!-- Tech stack line -->
  <text x="600" y="320" text-anchor="middle" fill="#7B8DAB" font-size="14" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-weight="400">
    Google Ads API  ·  GAARF  ·  Cloud Functions  ·  BigQuery  ·  Looker Studio
  </text>

  <!-- Bottom tagline -->
  <text x="600" y="355" text-anchor="middle" fill="#5A6D8A" font-size="13" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="400">
    Fully automated daily extraction, transformation &amp; visualization of pMax campaign performance
  </text>
</svg>
