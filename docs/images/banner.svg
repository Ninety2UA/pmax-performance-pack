    <circle cx="60" cy="100" r="1.5"/><circle cx="120" cy="100" r="1.5"/><circle cx="180" cy="100" r="1.5"/><circle cx="240" cy="100" r="1.5"/><circle cx="300" cy="100" r="1.5"/><circle cx="360" cy="100" r="1.5"/><circle cx="420" cy="100" r="1.5"/><circle cx="480" cy="100" r="1.5"/><circle cx="540" cy="100" r="1.5"/><circle cx="600" cy="100" r="1.5"/><circle cx="660" cy="100" r="1.5"/><circle cx="720" cy="100" r="1.5"/><circle cx="780" cy="100" r="1.5"/><circle cx="840" cy="100" r="1.5"/><circle cx="900" cy="100" r="1.5"/><circle cx="960" cy="100" r="1.5"/><circle cx="1020" cy="100" r="1.5"/><circle cx="1080" cy="100" r="1.5"/><circle cx="1140" cy="100" r="1.5"/>
