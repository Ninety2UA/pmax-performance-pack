    <rect x="28" y="40" width="18" height="90" rx="4" fill="#34A853"/>
    <rect x="56" y="70" width="18" height="60" rx="4" fill="#FBBC05"/>
    <rect x="84" y="20" width="18" height="110" rx="4" fill="#EA4335"/>
    <rect x="112" y="50" width="18" height="80" rx="4" fill="#4285F4"/>
  </g>

