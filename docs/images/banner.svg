      <text x="0" y="1" text-anchor="middle" dominant-baseline="central" fill="#9FA8DA" font-size="16">&#9201;</text>
      <text x="0" y="32" text-anchor="middle" fill="#7986CB" font-size="10" font-family="Arial, sans-serif" font-weight="500">Daily 4 AM</text>
    </g>
  </g>

  <!-- FEATURE PILLS — evenly spaced, centered -->
  <!-- Total width: 3 pills. Center at 600. Pills at 290, 500, 710 -->
  <!-- Per-Asset Metrics -->
  <rect x="220" y="278" width="210" height="36" rx="18" fill="rgba(66, 133, 244, 0.2)" stroke="rgba(66, 133, 244, 0.5)" stroke-width="1"/>
  <circle cx="241" cy="296" r="5" fill="#4285F4"/>
  <text x="257" y="301" fill="#93C5FD" font-size="14" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="500">Per-Asset Metrics</text>

  <!-- API v23+ Ready -->
  <rect x="460" y="278" width="175" height="36" rx="18" fill="rgba(52, 168, 83, 0.2)" stroke="rgba(52, 168, 83, 0.5)" stroke-width="1"/>
  <circle cx="481" cy="296" r="5" fill="#34A853"/>
  <text x="497" y="301" fill="#86EFAC" font-size="14" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="500">API v23+ Ready</text>

  <!-- Automated Pipeline -->
  <rect x="665" y="278" width="210" height="36" rx="18" fill="rgba(251, 188, 5, 0.2)" stroke="rgba(251, 188, 5, 0.5)" stroke-width="1"/>
  <circle cx="686" cy="296" r="5" fill="#FBBC05"/>
  <text x="702" y="301" fill="#FDE68A" font-size="14" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="500">Automated Pipeline</text>

  <!-- TECH STACK -->
  <text x="600" y="358" text-anchor="middle" fill="#5E6F8E" font-size="13" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-weight="400">Google Ads API  ·  GAARF  ·  Cloud Functions  ·  Cloud Workflows  ·  BigQuery  ·  Looker Studio</text>

  <!-- Bottom tagline -->
  <text x="600" y="390" text-anchor="middle" fill="#3D4E6B" font-size="12" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="400">Fully automated daily extraction, transformation &amp; visualization of pMax campaign performance</text>

  <!-- Google-colored accent bar -->
  <rect x="0" y="428" width="1200" height="12" fill="url(#accent)"/>
</svg>