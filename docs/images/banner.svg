  <!-- Subtitle -->
  <text x="600" y="125" text-anchor="middle" fill="#94A8CC" font-size="20" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="400">Google Performance Max Best Practices Dashboard</text>

  <!-- PIPELINE DIAGRAM — 4 steps centered, clock separate -->
  <!-- Pipeline center: x=600, y=200. Steps at -225, -75, 75, 225 (150px spacing) -->
  <g transform="translate(600, 200)">
    <!-- Pipeline container pill (covers 4 main steps) -->
    <rect x="-268" y="-36" width="536" height="72" rx="36" fill="url(#pipelineBg)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Step 1: Google Ads API (center at -225) -->
    <g transform="translate(-225, 0)">
      <rect x="-26" y="-24" width="52" height="48" rx="12" fill="#4285F4" filter="url(#iconGlow)" style="flood-color:#4285F4"/>
      <text x="0" y="1" text-anchor="middle" dominant-baseline="central" fill="white" font-size="22" font-family="'Google Sans', Arial, sans-serif" font-weight="700">G</text>
      <text x="0" y="48" text-anchor="middle" fill="#6B8CC7" font-size="10" font-family="Arial, sans-serif" font-weight="500">Ads API</text>
    </g>

    <!-- Arrow 1→2 -->
    <line x1="-199" y1="0" x2="-101" y2="0" stroke="rgba(255,255,255,0.35)" stroke-width="2" marker-end="url(#arrowHead)"/>

    <!-- Step 2: Cloud Functions / GAARF (center at -75) -->
    <g transform="translate(-75, 0)">
      <rect x="-26" y="-24" width="52" height="48" rx="12" fill="#34A853" filter="url(#iconGlow)" style="flood-color:#34A853"/>
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" fill="white" font-size="18" font-family="'Google Sans', Arial, sans-serif" font-weight="700">fn</text>
      <text x="0" y="48" text-anchor="middle" fill="#5DA06E" font-size="10" font-family="Arial, sans-serif" font-weight="500">GAARF</text>
    </g>

    <!-- Arrow 2→3 -->
    <line x1="-49" y1="0" x2="49" y2="0" stroke="rgba(255,255,255,0.35)" stroke-width="2" marker-end="url(#arrowHead)"/>

    <!-- Step 3: BigQuery (center at 75) -->
    <g transform="translate(75, 0)">
      <rect x="-26" y="-24" width="52" height="48" rx="12" fill="#F9AB00" filter="url(#iconGlow)" style="flood-color:#F9AB00"/>
      <text x="0" y="1" text-anchor="middle" dominant-baseline="central" fill="white" font-size="16" font-family="'Google Sans', Arial, sans-serif" font-weight="700">BQ</text>
      <text x="0" y="48" text-anchor="middle" fill="#C49520" font-size="10" font-family="Arial, sans-serif" font-weight="500">BigQuery</text>
    </g>

    <!-- Arrow 3→4 -->
    <line x1="101" y1="0" x2="199" y2="0" stroke="rgba(255,255,255,0.35)" stroke-width="2" marker-end="url(#arrowHead)"/>

    <!-- Step 4: Looker Studio (center at 225) -->
    <g transform="translate(225, 0)">
      <rect x="-26" y="-24" width="52" height="48" rx="12" fill="#EA4335" filter="url(#iconGlow)" style="flood-color:#EA4335"/>
      <text x="0" y="1" text-anchor="middle" dominant-baseline="central" fill="white" font-size="16" font-family="'Google Sans', Arial, sans-serif" font-weight="700">LS</text>
      <text x="0" y="48" text-anchor="middle" fill="#C4564B" font-size="10" font-family="Arial, sans-serif" font-weight="500">Dashboard</text>
    </g>

    <!-- Scheduler clock — separate, to the right with a subtle connector -->
    <line x1="258" y1="-12" x2="300" y2="-12" stroke="rgba(121,134,203,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
    <g transform="translate(330, -12)">
