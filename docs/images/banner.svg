    <circle cx="60" cy="220" r="1.5"/><circle cx="120" cy="220" r="1.5"/><circle cx="180" cy="220" r="1.5"/><circle cx="240" cy="220" r="1.5"/><circle cx="300" cy="220" r="1.5"/><circle cx="360" cy="220" r="1.5"/><circle cx="420" cy="220" r="1.5"/><circle cx="480" cy="220" r="1.5"/><circle cx="540" cy="220" r="1.5"/><circle cx="600" cy="220" r="1.5"/><circle cx="660" cy="220" r="1.5"/><circle cx="720" cy="220" r="1.5"/><circle cx="780" cy="220" r="1.5"/><circle cx="840" cy="220" r="1.5"/><circle cx="900" cy="220" r="1.5"/><circle cx="960" cy="220" r="1.5"/><circle cx="1020" cy="220" r="1.5"/><circle cx="1080" cy="220" r="1.5"/><circle cx="1140" cy="220" r="1.5"/>
    <circle cx="60" cy="280" r="1.5"/><circle cx="120" cy="280" r="1.5"/><circle cx="180" cy="280" r="1.5"/><circle cx="240" cy="280" r="1.5"/><circle cx="300" cy="280" r="1.5"/><circle cx="360" cy="280" r="1.5"/><circle cx="420" cy="280" r="1.5"/><circle cx="480" cy="280" r="1.5"/><circle cx="540" cy="280" r="1.5"/><circle cx="600" cy="280" r="1.5"/><circle cx="660" cy="280" r="1.5"/><circle cx="720" cy="280" r="1.5"/><circle cx="780" cy="280" r="1.5"/><circle cx="840" cy="280" r="1.5"/><circle cx="900" cy="280" r="1.5"/><circle cx="960" cy="280" r="1.5"/><circle cx="1020" cy="280" r="1.5"/><circle cx="1080" cy="280" r="1.5"/><circle cx="1140" cy="280" r="1.5"/>
    <circle cx="60" cy="340" r="1.5"/><circle cx="120" cy="340" r="1.5"/><circle cx="180" cy="340" r="1.5"/><circle cx="240" cy="340" r="1.5"/><circle cx="300" cy="340" r="1.5"/><circle cx="360" cy="340" r="1.5"/><circle cx="420" cy="340" r="1.5"/><circle cx="480" cy="340" r="1.5"/><circle cx="540" cy="340" r="1.5"/><circle cx="600" cy="340" r="1.5"/><circle cx="660" cy="340" r="1.5"/><circle cx="720" cy="340" r="1.5"/><circle cx="780" cy="340" r="1.5"/><circle cx="840" cy="340" r="1.5"/><circle cx="900" cy="340" r="1.5"/><circle cx="960" cy="340" r="1.5"/><circle cx="1020" cy="340" r="1.5"/><circle cx="1080" cy="340" r="1.5"/><circle cx="1140" cy="340" r="1.5"/>
    <circle cx="60" cy="400" r="1.5"/><circle cx="120" cy="400" r="1.5"/><circle cx="180" cy="400" r="1.5"/><circle cx="240" cy="400" r="1.5"/><circle cx="300" cy="400" r="1.5"/><circle cx="360" cy="400" r="1.5"/><circle cx="420" cy="400" r="1.5"/><circle cx="480" cy="400" r="1.5"/><circle cx="540" cy="400" r="1.5"/><circle cx="600" cy="400" r="1.5"/><circle cx="660" cy="400" r="1.5"/><circle cx="720" cy="400" r="1.5"/><circle cx="780" cy="400" r="1.5"/><circle cx="840" cy="400" r="1.5"/><circle cx="900" cy="400" r="1.5"/><circle cx="960" cy="400" r="1.5"/><circle cx="1020" cy="400" r="1.5"/><circle cx="1080" cy="400" r="1.5"/><circle cx="1140" cy="400" r="1.5"/>
