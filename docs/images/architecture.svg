<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4285F4"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34A853"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F9AB00"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="620" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#1a237e" font-size="22" font-family="'Google Sans', 'Segoe UI', Arial, sans-serif" font-weight="700">Pipeline Architecture</text>

  <!-- ═══════════════ ORCHESTRATION LAYER (top) ═══════════════ -->
  <rect x="300" y="60" width="400" height="70" rx="12" fill="#E8EAF6" stroke="#9FA8DA" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="500" y="82" text-anchor="middle" fill="#5C6BC0" font-size="11" font-family="Arial, sans-serif" font-weight="600" text-transform="uppercase" letter-spacing="1">ORCHESTRATION</text>

  <!-- Cloud Scheduler -->
  <rect x="320" y="92" width="150" height="30" rx="6" fill="#fff" stroke="#5C6BC0" stroke-width="1"/>
  <text x="330" y="112" fill="#5C6BC0" font-size="13" font-family="Arial, sans-serif">&#9201; Cloud Scheduler</text>

  <!-- Cloud Workflows -->
  <rect x="530" y="92" width="150" height="30" rx="6" fill="#fff" stroke="#5C6BC0" stroke-width="1"/>
  <text x="545" y="112" fill="#5C6BC0" font-size="13" font-family="Arial, sans-serif">&#9881; Cloud Workflows</text>

  <!-- Arrow: Scheduler -> Workflows -->
  <line x1="470" y1="107" x2="525" y2="107" stroke="#5C6BC0" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="498" y="100" text-anchor="middle" fill="#9FA8DA" font-size="9" font-family="Arial, sans-serif">4 AM CET</text>

  <!-- ═══════════════ ROW 1: Google Ads API ═══════════════ -->
  <rect x="80" y="165" width="220" height="70" rx="12" fill="#4285F4" filter="url(#shadow)"/>
  <text x="190" y="195" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="700">Google Ads API</text>
  <text x="190" y="215" text-anchor="middle" fill="#B3D4FC" font-size="12" font-family="Arial, sans-serif">REST v23</text>

  <!-- Arrow: Ads API -> Cloud Functions -->
  <line x1="305" y1="200" x2="385" y2="200" stroke="#4285F4" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="345" y="192" text-anchor="middle" fill="#4285F4" font-size="10" font-family="Arial, sans-serif" font-weight="600">GAQL</text>

  <!-- ═══════════════ ROW 1: Cloud Functions ═══════════════ -->
  <rect x="395" y="155" width="260" height="90" rx="12" fill="#34A853" filter="url(#shadow)"/>
  <text x="525" y="182" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="700">GAARF Cloud Functions</text>
  <text x="525" y="200" text-anchor="middle" fill="#B7E4C7" font-size="11" font-family="Arial, sans-serif">Cloud Functions v2 / Cloud Run</text>

  <!-- 4 function boxes inside -->
  <rect x="405" y="210" width="55" height="24" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="432" y="226" text-anchor="middle" fill="white" font-size="9" font-family="monospace">pmax</text>

  <rect x="465" y="210" width="55" height="24" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="492" y="226" text-anchor="middle" fill="white" font-size="9" font-family="monospace">getcids</text>

  <rect x="525" y="210" width="55" height="24" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="552" y="226" text-anchor="middle" fill="white" font-size="9" font-family="monospace">bq</text>

  <rect x="585" y="210" width="60" height="24" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="615" y="226" text-anchor="middle" fill="white" font-size="9" font-family="monospace">bq-view</text>

  <!-- Arrow: Cloud Functions -> BigQuery Raw -->
  <line x1="525" y1="250" x2="525" y2="300" stroke="#34A853" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="545" y="280" fill="#34A853" font-size="10" font-family="Arial, sans-serif" font-weight="600">19 tables</text>

  <!-- ═══════════════ ROW 1: GCS Config ═══════════════ -->
  <rect x="730" y="165" width="200" height="70" rx="12" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="830" y="192" text-anchor="middle" fill="#1565C0" font-size="14" font-family="Arial, sans-serif" font-weight="700">Cloud Storage</text>
  <text x="830" y="210" text-anchor="middle" fill="#64B5F6" font-size="10" font-family="Arial, sans-serif">Queries, Config, Credentials</text>

  <!-- Arrow: GCS -> Cloud Functions -->
  <line x1="730" y1="200" x2="660" y2="200" stroke="#90CAF9" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>

  <!-- ═══════════════ ROW 2: BigQuery Raw ═══════════════ -->
  <rect x="340" y="310" width="370" height="85" rx="12" fill="#F9AB00" filter="url(#shadow)"/>
  <text x="525" y="338" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="700">BigQuery — Raw Data</text>
  <text x="525" y="356" text-anchor="middle" fill="#FFF3CD" font-size="12" font-family="Arial, sans-serif">Dataset: pmax_ads</text>

  <!-- Table examples inside -->
  <rect x="355" y="365" width="90" height="20" rx="4" fill="rgba(255,255,255,0.25)"/>
  <text x="400" y="379" text-anchor="middle" fill="white" font-size="9" font-family="monospace">campaign_settings</text>

  <rect x="455" y="365" width="90" height="20" rx="4" fill="rgba(255,255,255,0.25)"/>
  <text x="500" y="379" text-anchor="middle" fill="white" font-size="9" font-family="monospace">assetgroupasset</text>

  <rect x="555" y="365" width="100" height="20" rx="4" fill="rgba(255,255,255,0.35)" stroke="white" stroke-width="1"/>
  <text x="605" y="379" text-anchor="middle" fill="white" font-size="9" font-family="monospace" font-weight="bold">asset_performance</text>

  <!-- "NEW" badge -->
  <rect x="633" y="358" width="30" height="14" rx="7" fill="#EA4335"/>
  <text x="648" y="368" text-anchor="middle" fill="white" font-size="8" font-family="Arial, sans-serif" font-weight="bold">NEW</text>

  <!-- Arrow: BQ Raw -> BQ Transformations -->
  <line x1="525" y1="400" x2="525" y2="440" stroke="#F9AB00" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="555" y="425" fill="#F9AB00" font-size="10" font-family="Arial, sans-serif" font-weight="600">16 queries</text>

  <!-- ═══════════════ ROW 3: BQ Transformations ═══════════════ -->
  <rect x="340" y="450" width="370" height="60" rx="12" fill="#E65100" filter="url(#shadow)"/>
  <text x="525" y="477" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="700">BQ Transformations</text>
  <text x="525" y="497" text-anchor="middle" fill="#FFCC80" font-size="12" font-family="Arial, sans-serif">Dataset: pmax_ads_bq (16 tables)</text>

  <!-- Arrow: BQ Transformations -> Looker Studio -->
  <line x1="525" y1="515" x2="525" y2="550" stroke="#E65100" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- ═══════════════ ROW 4: Looker Studio ═══════════════ -->
  <rect x="370" y="555" width="310" height="50" rx="12" fill="#EA4335" filter="url(#shadow)"/>
  <text x="525" y="585" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="700">Looker Studio Dashboard</text>

  <!-- ═══════════════ LEFT SIDEBAR: Account Resolution ═══════════════ -->
  <rect x="50" y="310" width="240" height="85" rx="12" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="335" text-anchor="middle" fill="#2E7D32" font-size="13" font-family="Arial, sans-serif" font-weight="700">Account Discovery</text>
  <text x="170" y="355" text-anchor="middle" fill="#66BB6A" font-size="11" font-family="Arial, sans-serif">MCC → Client Accounts</text>
  <text x="170" y="375" text-anchor="middle" fill="#81C784" font-size="10" font-family="monospace">pmax-getcids</text>

  <!-- Arrow: Account Discovery -> BQ Raw -->
  <line x1="290" y1="350" x2="335" y2="350" stroke="#A5D6A7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>

  <!-- ═══════════════ RIGHT SIDEBAR: Wildcard Views ═══════════════ -->
  <rect x="760" y="310" width="200" height="85" rx="12" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="860" y="335" text-anchor="middle" fill="#E65100" font-size="13" font-family="Arial, sans-serif" font-weight="700">Wildcard Views</text>
  <text x="860" y="355" text-anchor="middle" fill="#FF9800" font-size="11" font-family="Arial, sans-serif">table_* unions per-account</text>
  <text x="860" y="375" text-anchor="middle" fill="#FFB74D" font-size="10" font-family="monospace">pmax-bq-view</text>

  <!-- Arrow: BQ Raw -> Wildcard Views -->
  <line x1="715" y1="350" x2="755" y2="350" stroke="#FFCC80" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>
</svg>
